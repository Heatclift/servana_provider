name: tidy_cleaner_mobile
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  animate_do: ^3.3.4
  awesome_dialog: ^3.2.1
  calendar_date_picker2: ^1.1.7
  circle_nav_bar: ^2.1.0+1
  cupertino_icons: ^1.0.6
  dio: ^5.9.2
  dotted_border: ^2.1.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  flutter_credit_card: ^4.1.0
  flutter_rating_bar: ^4.0.1
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  gap: ^3.0.1
  get_it: ^7.6.7
  go_router: ^13.2.1
  image_cropper: ^8.0.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  intl_phone_number_field: ^0.1.9
  percent_indicator: ^4.2.3
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.5.4
  table_calendar: ^3.1.2
  top_snackbar_flutter: ^3.0.0+1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/servana_logo.png"
  adaptive_icon_foreground: "assets/icons/servana_logo.png"
  adaptive_icon_background: "#ffffff" # Hex color or image path

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/companies/
    - assets/icons/svg/
